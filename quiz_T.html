<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Game Tsunami</title>

<style>

/* ================= BACKGROUND TSUNAMI ================= */

body{
font-family:Fredoka, sans-serif;
text-align:center;
margin:0;
overflow-x:hidden;
background:linear-gradient(#00c6ff,#0072ff);
padding:10px;
}

/* ombak */

body::after{
content:"";
position:fixed;
bottom:-40px;
left:0;
width:200%;
height:220px;
background:rgba(255,255,255,.35);
border-radius:40%;
animation:wave 6s linear infinite;
pointer-events:none;
}

@keyframes wave{
from{transform:translateX(0);}
to{transform:translateX(-50%);}
}

/* HEADER */

header{
background:#00a8e8;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
}

/* BACK BUTTON */

.back-btn{
position:absolute;
top:12px;
left:12px;
background:white;
padding:7px 12px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
color:#333;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
font-size:14px;
}

/* KARAKTER */

.earth{
font-size:95px;
animation:bounce 1s infinite alternate;
}

@keyframes bounce{
from{transform:translateY(0)}
to{transform:translateY(-12px)}
}

/* CHAT */

.bubble{
background:rgba(255,255,255,.9);
backdrop-filter:blur(6px);
padding:12px 18px;
border-radius:20px;
display:inline-block;
margin:15px;
box-shadow:0 4px 10px rgba(0,0,0,.2);
min-height:45px;
max-width:95%;
}

/* BUTTON */

button{
padding:10px 18px;
margin:8px;
border:none;
border-radius:10px;
cursor:pointer;
background:#00a8e8;
color:white;
font-weight:bold;
transition:.2s;
}

button:hover{
transform:scale(1.05);
}

.star{
font-size:35px;
color:gold;
}

/* ================= RESPONSIVE HP ================= */

@media (max-width:600px){

header{
font-size:20px;
}

.earth{
font-size:70px;
}

#question{
font-size:20px;
padding:0 10px;
}

button{
width:90%;
max-width:280px;
display:block;
margin:10px auto;
}

.back-btn{
font-size:13px;
padding:6px 10px;
}

}

</style>
</head>

<body>

<header>🌊 Game Tsunami</header>

<a href="menu_quiz.html" class="back-btn">⬅ Kembali</a>

<audio id="bgm" src="backsound_quiz.mp3" loop></audio>
<audio id="benar" src="benar.mp3"></audio>
<audio id="salah" src="salah.mp3"></audio>

<div class="bubble" id="bubble"></div>

<div class="earth" id="earth">🌎🙂</div>

<h3 id="progress"></h3>
<h2 id="question"></h2>

<div id="answers"></div>

<h2 id="result"></h2>

<div id="stars"></div>

<button id="restartBtn" onclick="restart()" style="display:none;">
🔁 Main Lagi
</button>

<script>

/* ===== AUTO PLAY MUSIC ===== */

document.body.addEventListener("click",()=>{
document.getElementById("bgm").play();
},{once:true});

/* ===== DATA QUIZ ===== */

const quiz=[
{q:"Tsunami disebabkan oleh?",a:["Gempa laut","Hujan","Angin"],c:0},
{q:"Air laut surut tiba-tiba berarti?",a:["Bahaya","Aman","Biasa"],c:0},
{q:"Kita harus menuju?",a:["Tempat tinggi","Pantai","Laut"],c:0},
{q:"Bolehkah menonton ombak?",a:["Tidak","Boleh","Wajib"],c:0},
{q:"Ikuti siapa saat evakuasi?",a:["Petugas","Sendiri","Teman"],c:0}
];

let i=0;
let score=0;

/* ===== TEXT KETIK ===== */

function typeText(text){
let el=document.getElementById("bubble");
el.innerHTML="";
let n=0;

let typing=setInterval(()=>{
el.innerHTML+=text.charAt(n);
n++;
if(n>=text.length) clearInterval(typing);
},30);
}

/* ===== LOAD SOAL ===== */

function load(){

if(i===0){
typeText("Halo! Aku Bumi 🌎 Yuk belajar tentang Tsunami!");
}

if(i>=quiz.length){
finish();
return;
}

progress.innerHTML="Soal "+(i+1)+" / "+quiz.length;
question.innerHTML=quiz[i].q;

answers.innerHTML="";

quiz[i].a.forEach((p,x)=>{
answers.innerHTML+=
`<button onclick="check(${x})">${p}</button>`;
});

}

/* ===== CEK ===== */

function check(x){

let earth=document.getElementById("earth");

if(x===quiz[i].c){
score++;
earth.innerHTML="🌎😊";
document.getElementById("benar").play();
}else{
earth.innerHTML="🌎😢";
document.getElementById("salah").play();
}

i++;

setTimeout(load,600);

}

/* ===== FINISH ===== */

function finish(){

question.innerHTML="Skor Kamu "+score+"/"+quiz.length;

answers.innerHTML="";

progress.innerHTML="";

let star=3;

if(score<5) star=2;

if(score<=2) star=1;

stars.innerHTML="⭐".repeat(star);

let earth=document.getElementById("earth");

if(score===quiz.length){
earth.innerHTML="🌎😁";
typeText("Hebat! Kamu tahu cara selamat dari tsunami!");
}else{
earth.innerHTML="🌎🙂";
typeText("Bagus! Yuk belajar lagi agar lebih siap!");
}

document.getElementById("restartBtn").style.display="inline-block";

}

/* ===== RESTART */

function restart(){

i=0;

score=0;

stars.innerHTML="";

earth.innerHTML="🌎🙂";

document.getElementById("restartBtn").style.display="none";

load();

}

load();

</script>

</body>
</html>
