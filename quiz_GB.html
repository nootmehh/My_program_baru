<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Game Gempa Bumi</title>

<style>

/* ================= BACKGROUND ================= */

body{
font-family:Fredoka, sans-serif;
text-align:center;
margin:0;
overflow-x:hidden;
background:linear-gradient(#5dade2,#2e86c1);
padding:10px;
}

/* ================= HUJAN ================= */

.rain{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
pointer-events:none;
overflow:hidden;
z-index:0;
}

.drop{
position:absolute;
width:2px;
height:18px;
background:linear-gradient(transparent,rgba(255,255,255,0.8));
animation:fall linear infinite;
opacity:.8;
}

@keyframes fall{
0%{transform:translateY(-100px);opacity:1;}
100%{transform:translateY(100vh);opacity:0;}
}

/* ================= HEADER ================= */

header{
background:#43aa8b;
color:white;
padding:15px;
font-size:22px;
font-weight:bold;
position:relative;
z-index:2;
}

/* ================= BACK BUTTON ================= */

.back-btn{
position:absolute;
top:12px;
left:12px;
background:white;
padding:7px 12px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
color:#333;
box-shadow:0 3px 8px rgba(0,0,0,0.2);
z-index:2;
font-size:14px;
}

/* ================= KARAKTER ================= */

.earth{
font-size:95px;
animation:bounce 1s infinite alternate;
position:relative;
z-index:2;
}

@keyframes bounce{
from{transform:translateY(0)}
to{transform:translateY(-12px)}
}

/* ================= CHAT ================= */

.bubble{
background:rgba(255,255,255,.9);
backdrop-filter:blur(6px);
padding:12px 18px;
border-radius:20px;
display:inline-block;
margin:15px;
box-shadow:0 4px 10px rgba(0,0,0,.2);
min-height:45px;
max-width:95%;
position:relative;
z-index:2;
}

/* ================= BUTTON ================= */

button{
padding:10px 18px;
margin:8px;
border:none;
border-radius:10px;
cursor:pointer;
background:#43aa8b;
color:white;
font-weight:bold;
transition:.2s;
position:relative;
z-index:2;
}

button:hover{
transform:scale(1.05);
}

.star{
font-size:35px;
color:gold;
position:relative;
z-index:2;
}

h2,h3{
position:relative;
z-index:2;
color:white;
}

/* ================= RESPONSIVE HP ================= */

@media (max-width:600px){

header{
font-size:20px;
}

.earth{
font-size:70px;
}

#question{
font-size:20px;
padding:0 10px;
}

button{
width:90%;
max-width:280px;
display:block;
margin:10px auto;
}

.back-btn{
font-size:13px;
padding:6px 10px;
}

}

</style>
</head>

<body>

<!-- HUJAN -->
<div class="rain" id="rain"></div>

<header>🌧️ Game Banjir</header>
<a href="menu_quiz.html" class="back-btn">⬅ Kembali</a>

<audio id="bgm" src="backsound_quiz.mp3" loop></audio>
<audio id="benar" src="benar.mp3"></audio>
<audio id="salah" src="salah.mp3"></audio>

<div class="bubble" id="bubble"></div>

<div class="earth" id="earth">🌎🙂</div>

<h3 id="progress"></h3>
<h2 id="question"></h2>

<div id="answers"></div>

<h2 id="result"></h2>

<div id="stars"></div>

<button id="restartBtn" onclick="restart()" style="display:none;">
🔁 Main Lagi
</button>

<script>

/* ===== AUTO PLAY MUSIC ===== */

document.body.addEventListener("click",()=>{
document.getElementById("bgm").play();
},{once:true});

/* ===== HUJAN ===== */

const rain=document.getElementById("rain");

for(let i=0;i<160;i++){
let drop=document.createElement("div");
drop.className="drop";

drop.style.left=Math.random()*100+"%";
drop.style.animationDuration=(0.4+Math.random()*0.6)+"s";
drop.style.animationDelay=Math.random()*2+"s";
drop.style.height=(12+Math.random()*15)+"px";

rain.appendChild(drop);
}

/* ===== DATA QUIZ ===== */

const quiz=[
{q:"Banjir terjadi karena?",a:["Hujan deras","Salju","Kabut"],c:0},
{q:"Air banjir itu?",a:["Berbahaya","Aman","Bersih"],c:0},
{q:"Saat banjir kita?",a:["Ke tempat tinggi","Main air","Berenang"],c:0},
{q:"Listrik saat banjir?",a:["Dimatikan","Dinyalakan","Tidak apa"],c:0},
{q:"Boleh bermain banjir?",a:["Tidak boleh","Boleh","Harus"],c:0}
];

let i=0;
let score=0;

/* ===== TEXT KETIK ===== */

function typeText(text){
let el=document.getElementById("bubble");
el.innerHTML="";
let n=0;

let typing=setInterval(()=>{
el.innerHTML+=text.charAt(n);
n++;
if(n>=text.length) clearInterval(typing);
},30);
}

/* ===== LOAD ===== */

function load(){

if(i===0){
typeText("Halo! Aku Bumi 🌎 Yuk belajar tentang Banjir!");
}

if(i>=quiz.length){
finish();
return;
}

progress.innerHTML="Soal "+(i+1)+" / "+quiz.length;
question.innerHTML=quiz[i].q;

answers.innerHTML="";

quiz[i].a.forEach((p,x)=>{
answers.innerHTML+=
`<button onclick="check(${x})">${p}</button>`;
});

}

/* ===== CEK ===== */

function check(x){

let earth=document.getElementById("earth");

if(x===quiz[i].c){
score++;
earth.innerHTML="🌎😊";
document.getElementById("benar").play();
}else{
earth.innerHTML="🌎😢";
document.getElementById("salah").play();
}

i++;
setTimeout(load,600);
}

/* ===== FINISH ===== */

function finish(){

question.innerHTML="Skor Kamu "+score+"/"+quiz.length;

answers.innerHTML="";

let star=3;

if(score<5) star=2;

if(score<=2) star=1;

stars.innerHTML="⭐".repeat(star);

document.getElementById("restartBtn").style.display="inline-block";

let earth=document.getElementById("earth");

if(score===quiz.length){
earth.innerHTML="🌎😁";
typeText("Hebat! Kamu tahu cara aman saat banjir!");
}else{
earth.innerHTML="🌎🙂";
typeText("Bagus! Yuk belajar lagi agar lebih siap!");
}

}

/* ===== RESTART ===== */

function restart(){

i=0;
score=0;
stars.innerHTML="";
earth.innerHTML="🌎🙂";

document.getElementById("restartBtn").style.display="none";

load();

}

load();

</script>

</body>
</html>
